services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - incidentops-network

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.local}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - incidentops-network

  backend:
    image: incidentops-backend:latest
    build:
      context: .             #Context Defines the path of the structure(folder structure).
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.local}
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    networks:
      - incidentops-network

  frontend:
    image: incidentops-frontend:latest
    env_file:
      - ${ENV_FILE:-.env.local}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - incidentops-network

networks:
  incidentops-network:
    driver: bridge
volumes:
  redis-data:
  postgres-data: