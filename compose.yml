services:
  postgres:
    image: postgres:18
    container_name: incidentops-postgres
    environment:
      POSTGRES_DB: incidentops
      POSTGRES_USER: incidentopsuser
      POSTGRES_PASSWORD: arjun123
    ports:
      - "5433:5432"
    volumes:
      - incidentops_pg_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U incidentopsuser -d incidentops" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  incidentops_pg_data: