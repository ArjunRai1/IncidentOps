spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/incident_ops
    username: incidentops_user
    password: incidentops_pass

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379
logging:
  level:
    com.incidentops: DEBUG