services:
  redis:
    image: redis:7-alpine
    container_name: incident-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
  postgres:
    image: postgres:16-alpine
    container_name: incident-postgres
    environment:
      POSTGRES_DB: incident_ops
      POSTGRES_USER: incidentops_user
      POSTGRES_PASSWORD: incidentops_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  redis-data:
  postgres-data: